aid: chicago-transit-authority
name: Chicago Transit Authority
x-type: government
description: >-
  The Chicago Transit Authority (CTA) is the public transit operator for
  the City of Chicago and 35 surrounding suburbs, operating the second
  largest public transit system in the United States with bus and
  rapid-transit (L) train services. The CTA Developer Center publishes
  open transit data feeds and APIs for developers building rider-facing
  applications, including the Train Tracker API for real-time L-train
  arrivals, the Bus Tracker API for real-time bus arrivals and vehicle
  locations, the Customer Alerts API for service status and disruptions,
  and GTFS schedule data feeds for the entire CTA bus and rail network.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: >-
  https://raw.githubusercontent.com/api-evangelist/chicago-transit-authority/refs/heads/main/apis.yml
