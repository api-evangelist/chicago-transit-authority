apis:
  - aid: chicago-transit-authority:train-tracker-api
    name: CTA Train Tracker API
    description: >-
      The Train Tracker API provides real-time train arrival predictions
      and run/location information for all CTA L train lines. Endpoints
      include arrival predictions by station or stop, follow-this-train
      run tracking, and a locations service exposing the current
      latitude/longitude of in-service trains. Authentication requires
      a developer API key issued through the CTA Developer Center.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.transitchicago.com/developers/traintracker/
    baseURL: http://lapi.transitchicago.com/api/1.0
    tags:
      - L Train
      - Real-Time
      - Train Tracker
      - Transit
    properties:
      - type: Documentation
        url: https://www.transitchicago.com/developers/traintracker/
      - type: APIDocs
        url: https://www.transitchicago.com/developers/ttdocs/
      - type: APIKeyApplication
        url: https://www.transitchicago.com/developers/traintrackerapply/
      - type: TermsOfUse
        url: https://www.transitchicago.com/developers/terms/
      - type: OpenAPI
        url: openapi/cta-train-tracker-openapi.yml
      - type: Spectral
        url: spectral/chicago-transit-authority-spectral.yml
  - aid: chicago-transit-authority:bus-tracker-api
    name: CTA Bus Tracker API
    description: >-
      The Bus Tracker API series provides real-time bus arrival
      predictions, vehicle locations, route patterns, route lists, and
      stop directories for the CTA bus network. Endpoints support
      route, stop, and vehicle-based queries returning JSON or XML.
      Authentication requires a developer API key issued through the
      CTA Developer Center.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.transitchicago.com/developers/bustracker/
    baseURL: http://www.ctabustracker.com/bustime/api/v2
    tags:
      - Bus
      - Bus Tracker
      - Real-Time
      - Transit
    properties:
      - type: Documentation
        url: https://www.transitchicago.com/developers/bustracker/
      - type: TermsOfUse
        url: https://www.transitchicago.com/developers/terms/
      - type: OpenAPI
        url: openapi/cta-bus-tracker-openapi.yml
  - aid: chicago-transit-authority:customer-alerts-api
    name: CTA Customer Alerts API
    description: >-
      The Customer Alerts API delivers real-time service status, planned
      outages, and disruption information for CTA bus and rail services.
      It provides both a route-level status feed and per-route or
      per-station detail. Authentication is not required for the public
      Customer Alerts feeds.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.transitchicago.com/developers/alerts/
    baseURL: http://www.transitchicago.com/api/1.0
    tags:
      - Customer Alerts
      - Real-Time
      - Service Status
      - Transit
    properties:
      - type: Documentation
        url: https://www.transitchicago.com/developers/alerts/
  - aid: chicago-transit-authority:gtfs-feed
    name: CTA GTFS Schedule Feed
    description: >-
      CTA publishes a GTFS (General Transit Feed Specification) schedule
      feed covering the physical layout, stop locations, and static
      schedules for the entire CTA bus and L train system. The feed is
      a downloadable ZIP archive that conforms to the GTFS reference and
      is updated when CTA service changes.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.transitchicago.com/developers/gtfs/
    baseURL: https://www.transitchicago.com/downloads/sch_data/google_transit.zip
    tags:
      - GTFS
      - Schedule
      - Static
      - Transit
    properties:
      - type: Documentation
        url: https://www.transitchicago.com/developers/gtfs/
      - type: Feed
        url: https://www.transitchicago.com/downloads/sch_data/google_transit.zip
      - type: DataGov
        url: https://catalog.data.gov/dataset/cta-system-information-developer-tool-gtfs-data
      - type: Transitland
        url: https://www.transit.land/feeds/f-dp3-cta
      - type: ChicagoDataPortal
        url: https://data.cityofchicago.org/Transportation/CTA-System-Information-Developer-Tool-GTFS-Data/sp6w-yusg
